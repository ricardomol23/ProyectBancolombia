<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #12212f; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #4b5b68; }
      .box-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #12212f; }
      .box-text { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #23323d; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #23323d; }
      .arrow { stroke: #43637a; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43637a" />
    </marker>
  </defs>

  <rect width="1600" height="980" fill="#f4f1ea"/>
  <text x="70" y="65" class="title">Pipeline Analitico en Produccion</text>
  <text x="70" y="95" class="subtitle">Ingesta, transformacion SQL, modelo KMeans, insights de negocio y dashboard para equipos comerciales y financieros</text>

  <rect x="70" y="150" width="220" height="110" rx="18" fill="#d9ead3" stroke="#7aa36f" stroke-width="2"/>
  <text x="180" y="185" text-anchor="middle" class="box-title">1. Fuentes</text>
  <text x="180" y="215" text-anchor="middle" class="box-text">CSV de portafolios</text>
  <text x="180" y="238" text-anchor="middle" class="box-text">Catalogos</text>
  <text x="180" y="261" text-anchor="middle" class="box-text">Datos de mercado</text>

  <rect x="360" y="150" width="240" height="110" rx="18" fill="#cfe2f3" stroke="#6a93ba" stroke-width="2"/>
  <text x="480" y="185" text-anchor="middle" class="box-title">2. Ingesta Python</text>
  <text x="480" y="215" text-anchor="middle" class="box-text">load_data.py</text>
  <text x="480" y="238" text-anchor="middle" class="box-text">Carga automatica</text>
  <text x="480" y="261" text-anchor="middle" class="box-text">Validacion inicial</text>

  <rect x="670" y="150" width="240" height="110" rx="18" fill="#fff2cc" stroke="#b59b4b" stroke-width="2"/>
  <text x="790" y="185" text-anchor="middle" class="box-title">3. PostgreSQL</text>
  <text x="790" y="215" text-anchor="middle" class="box-text">Tablas base por CSV</text>
  <text x="790" y="238" text-anchor="middle" class="box-text">Persistencia central</text>
  <text x="790" y="261" text-anchor="middle" class="box-text">Datos historicos</text>

  <rect x="980" y="150" width="260" height="110" rx="18" fill="#f4cccc" stroke="#bd7272" stroke-width="2"/>
  <text x="1110" y="185" text-anchor="middle" class="box-title">4. Transformacion SQL</text>
  <text x="1110" y="215" text-anchor="middle" class="box-text">Limpieza y tipificacion</text>
  <text x="1110" y="238" text-anchor="middle" class="box-text">Normalizacion y joins</text>
  <text x="1110" y="261" text-anchor="middle" class="box-text">Consolidacion</text>

  <rect x="1310" y="150" width="220" height="110" rx="18" fill="#ead1dc" stroke="#9b7085" stroke-width="2"/>
  <text x="1420" y="185" text-anchor="middle" class="box-title">5. Fact Final</text>
  <text x="1420" y="215" text-anchor="middle" class="box-text">fact_inversiones_</text>
  <text x="1420" y="238" text-anchor="middle" class="box-text">consolidada</text>

  <line x1="290" y1="205" x2="360" y2="205" class="arrow"/>
  <line x1="600" y1="205" x2="670" y2="205" class="arrow"/>
  <line x1="910" y1="205" x2="980" y2="205" class="arrow"/>
  <line x1="1240" y1="205" x2="1310" y2="205" class="arrow"/>

  <rect x="260" y="360" width="280" height="120" rx="18" fill="#d9ead3" stroke="#7aa36f" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" class="box-title">6. Feature Engineering</text>
  <text x="400" y="425" text-anchor="middle" class="box-text">Variables por cliente</text>
  <text x="400" y="448" text-anchor="middle" class="box-text">COP, USD, concentracion,</text>
  <text x="400" y="471" text-anchor="middle" class="box-text">diversificacion y composicion</text>

  <rect x="660" y="360" width="280" height="120" rx="18" fill="#cfe2f3" stroke="#6a93ba" stroke-width="2"/>
  <text x="800" y="395" text-anchor="middle" class="box-title">7. Modelo Analitico</text>
  <text x="800" y="425" text-anchor="middle" class="box-text">KMeans</text>
  <text x="800" y="448" text-anchor="middle" class="box-text">Segmentacion de clientes</text>
  <text x="800" y="471" text-anchor="middle" class="box-text">perfiles de portafolio</text>

  <rect x="1060" y="360" width="320" height="120" rx="18" fill="#fff2cc" stroke="#b59b4b" stroke-width="2"/>
  <text x="1220" y="395" text-anchor="middle" class="box-title">8. Reglas de Negocio</text>
  <text x="1220" y="425" text-anchor="middle" class="box-text">Insights automaticos</text>
  <text x="1220" y="448" text-anchor="middle" class="box-text">Alertas de concentracion y riesgo</text>
  <text x="1220" y="471" text-anchor="middle" class="box-text">Oportunidades comerciales</text>

  <line x1="1420" y1="260" x2="1420" y2="320" class="arrow"/>
  <line x1="1420" y1="320" x2="400" y2="320" class="arrow"/>
  <line x1="400" y1="320" x2="400" y2="360" class="arrow"/>
  <line x1="540" y1="420" x2="660" y2="420" class="arrow"/>
  <line x1="940" y1="420" x2="1060" y2="420" class="arrow"/>

  <rect x="390" y="600" width="320" height="130" rx="18" fill="#f4cccc" stroke="#bd7272" stroke-width="2"/>
  <text x="550" y="635" text-anchor="middle" class="box-title">9. Capa de Consumo</text>
  <text x="550" y="665" text-anchor="middle" class="box-text">Dashboard Dash</text>
  <text x="550" y="688" text-anchor="middle" class="box-text">Vista descriptiva, analitica</text>
  <text x="550" y="711" text-anchor="middle" class="box-text">y de negocio</text>

  <rect x="860" y="600" width="340" height="130" rx="18" fill="#ead1dc" stroke="#9b7085" stroke-width="2"/>
  <text x="1030" y="635" text-anchor="middle" class="box-title">10. Usuarios</text>
  <text x="1030" y="665" text-anchor="middle" class="box-text">Equipo comercial</text>
  <text x="1030" y="688" text-anchor="middle" class="box-text">Equipo financiero</text>
  <text x="1030" y="711" text-anchor="middle" class="box-text">Toma de decision y seguimiento</text>

  <line x1="1220" y1="480" x2="1220" y2="540" class="arrow"/>
  <line x1="1220" y1="540" x2="550" y2="540" class="arrow"/>
  <line x1="550" y1="540" x2="550" y2="600" class="arrow"/>
  <line x1="710" y1="665" x2="860" y2="665" class="arrow"/>

  <rect x="70" y="790" width="420" height="120" rx="18" fill="#ddebf7" stroke="#6a93ba" stroke-width="2"/>
  <text x="280" y="825" text-anchor="middle" class="box-title">Orquestacion en produccion</text>
  <text x="280" y="855" text-anchor="middle" class="box-text">Airflow / Prefect / Cron</text>
  <text x="280" y="878" text-anchor="middle" class="box-text">Ejecucion diaria o programada</text>

  <rect x="570" y="790" width="420" height="120" rx="18" fill="#e2f0d9" stroke="#7aa36f" stroke-width="2"/>
  <text x="780" y="825" text-anchor="middle" class="box-title">Monitoreo y calidad</text>
  <text x="780" y="855" text-anchor="middle" class="box-text">Logs, validaciones, alertas</text>
  <text x="780" y="878" text-anchor="middle" class="box-text">Control de fallos y consistencia</text>

  <rect x="1070" y="790" width="460" height="120" rx="18" fill="#fce5cd" stroke="#c59053" stroke-width="2"/>
  <text x="1300" y="825" text-anchor="middle" class="box-title">Operacion esperada</text>
  <text x="1300" y="855" text-anchor="middle" class="box-text">Ingreso de nuevos datos, reproceso SQL, actualizacion del modelo,</text>
  <text x="1300" y="878" text-anchor="middle" class="box-text">publicacion de insights y consulta desde dashboard</text>

  <line x1="280" y1="790" x2="280" y2="735" class="arrow"/>
  <line x1="280" y1="735" x2="400" y2="735" class="arrow"/>
  <line x1="780" y1="790" x2="780" y2="735" class="arrow"/>
  <line x1="780" y1="735" x2="800" y2="735" class="arrow"/>
  <line x1="1300" y1="790" x2="1300" y2="735" class="arrow"/>
  <line x1="1300" y1="735" x2="1030" y2="735" class="arrow"/>
</svg>
